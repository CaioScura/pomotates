<ion-content [fullscreen]="true">

  <div class="login-container">

    <h1 class="titulo">Cadastrar</h1>

    <form [formGroup]="loginForm">

        <!-- EMAIL -->
      <div class="input-group">
        <label>Nome</label>

        <div class="input-box">
          <ion-input
            type="text"
            placeholder="Seu nome"
            formControlName="nome">
          </ion-input>

        </div>
      </div>

      <!-- EMAIL -->
      <div class="input-group">
        <label>E-mail</label>

        <div class="input-box">
          <ion-input
            type="email"
            placeholder="email@email.com"
            formControlName="email">
          </ion-input>

        </div>
      </div>


      <!-- SENHA -->
      <div class="input-group">
        <label>Senha</label>

        <div class="input-box">
          <ion-input
            type="password"
            formControlName="senha">
          </ion-input>

        </div>
      </div>

      <!-- CONFIRMAR SENHA -->
      <div class="input-group">
        <label>Confirme a senha</label>

        <div class="input-box">
          <ion-input
            type="password"
            formControlName="confirmarSenha">
          </ion-input>

        </div>
      </div>


      <!-- BOTÃO -->
      <ion-button
        expand="block"
        type="submit"
        class="btn btn-primary"
        (click)="goToLogin()">
        Criar uma conta
      </ion-button>

    </form>

    <a class="novo-cadastro" (click)="goToLogin()">Já tenho uma conta</a>

  </div>

</ion-content>
