<ion-content [fullscreen]="true">
    <div class="container-center">
      <ion-tabs>
        <ion-tab tab="home">
          <div id="home-page" class="ion-page">
            <ion-header>
              <ion-toolbar>
                <ion-title>Home</ion-title>
              </ion-toolbar>
            </ion-header>
            <ion-content>
              <div class="example-content">Listen now content</div>
            </ion-content>
          </div>
        </ion-tab>
        <ion-tab tab="play-pomodoro">
          <div id="play-pomodoro" class="ion-page">
            <ion-header>
              <ion-toolbar>
                <ion-title>Iniciar pomodoro</ion-title>
              </ion-toolbar>
            </ion-header>
            <ion-content>
              <div class="example-content">Iniciar pomodoro</div>
            </ion-content>
          </div>
        </ion-tab>
        <ion-tab tab="library">
          <div id="library-page" class="ion-page">
            <ion-header>
              <ion-toolbar>
                <ion-title>Library</ion-title>
              </ion-toolbar>
            </ion-header>
            <ion-content>
              <div class="example-content">Library content</div>
            </ion-content>
          </div>
        </ion-tab>
        <ion-tab tab="search">
          <div id="search-page" class="ion-page">
            <ion-header>
              <ion-toolbar>
                <ion-title>Search</ion-title>
              </ion-toolbar>
            </ion-header>
            <ion-content>
              <div class="example-content">Search content</div>
            </ion-content>
          </div>
        </ion-tab>

        <ion-tab-bar slot="bottom">
          <ion-tab-button tab="home">
            <ion-icon name="play-circle"></ion-icon>
            Relatório
          </ion-tab-button>

          <ion-tab-button tab="play-pomodoro">
            <ion-icon name="play-pomodoro"></ion-icon>
            Iniciar pomodoro
          </ion-tab-button>

          <ion-tab-button tab="library">
            <ion-icon name="library"></ion-icon>
            Chat
          </ion-tab-button>
        </ion-tab-bar>
      </ion-tabs>
    </div>



</ion-content>
